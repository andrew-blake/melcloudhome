name: Dependency Audit

on:
  schedule:
    - cron: "0 8 * * 1"
  pull_request:
    paths: ["uv.lock", "pyproject.toml"]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  osv-scan:
    name: OSV Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Export lockfile
        run: uv export --format requirements-txt --no-hashes --no-emit-project > "$GITHUB_WORKSPACE/requirements.txt"
      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            -r
            --config=/github/workspace/osv-scanner.toml
            --lockfile=/github/workspace/requirements.txt
